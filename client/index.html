<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NightTalk | Connect Anonymously</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #000000); color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .chip { transition: all 0.3s ease; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.2); }
        .chip.selected { background: #6366f1; border-color: #818cf8; box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
        .glow-button { background: linear-gradient(45deg, #4f46e5, #9333ea); transition: transform 0.2s; }
        .glow-button:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(79, 70, 229, 0.6); }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div id="landing" class="glass max-w-lg w-full p-8 rounded-3xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-extrabold tracking-tighter mb-2 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">NightTalk</h1>
            <p class="text-gray-400 font-light italic">Speak your truth under the cover of night.</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">Nickname</label>
                <input type="text" id="nickname" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 transition-all" placeholder="E.g. MidnightRider">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">Age: <span id="ageVal" class="text-indigo-400">21</span></label>
                <input type="range" id="age" min="18" max="99" value="21" class="w-full accent-indigo-500" oninput="document.getElementById('ageVal').innerText = this.value">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">Select Your Interests (Max 3)</label>
                <div id="topic-container" class="flex flex-wrap gap-2">
                    </div>
            </div>

            <button onclick="enterLobby()" class="glow-button w-full py-4 rounded-2xl font-bold text-lg mt-4">Enter the Void</button>
        </div>
    </div>

    <div id="lobby" class="hidden w-full max-w-6xl">
        <div class="flex flex-col md:flex-row gap-6">
            
            <div class="w-full md:w-80 space-y-4">
                <div class="glass p-6 rounded-3xl">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span> Global Groups
                    </h2>
                    <div id="group-list" class="space-y-2 max-h-[60vh] overflow-y-auto pr-2">
                        </div>
                </div>
            </div>

            <div class="flex-1 glass p-6 rounded-3xl">
                <h2 class="text-2xl font-bold mb-6">People Online</h2>
                <div id="users-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Connect to your server
        const socket = io(window.location.origin, { secure: true, transports: ['websocket', 'polling'] });
        
        // Here are your 15 topics! You can change these words anytime.
        const topicsList = ["Politics", "Art", "Travel", "Gaming", "Coding", "Music", "Fitness", "Movies", "Anime", "Crypto", "Space", "Mental Health", "Photography", "Philosophy", "Foodie"];
        const selectedTopics = new Set();

        // 1. Automatically build the clickable topic chips on the front page
        const topicContainer = document.getElementById('topic-container');
        topicsList.forEach(topic => {
            const span = document.createElement('span');
            span.className = 'chip px-4 py-2 rounded-full text-sm font-medium bg-white/5';
            span.innerText = topic;
            span.onclick = () => {
                if(selectedTopics.has(topic)) {
                    selectedTopics.delete(topic);
                    span.classList.remove('selected');
                } else if(selectedTopics.size < 3) { // Max 3 topics
                    selectedTopics.add(topic);
                    span.classList.add('selected');
                }
            };
            topicContainer.appendChild(span);
        });

        // 2. Automatically build the 15 groups in the sidebar on the second page
        const groupList = document.getElementById('group-list');
        topicsList.forEach(topic => {
            const div = document.createElement('div');
            div.className = 'p-3 rounded-xl hover:bg-white/10 cursor-pointer border border-transparent hover:border-white/10 transition-all flex justify-between items-center group';
            div.innerHTML = `<span># ${topic}</span><span class="text-xs text-gray-500 group-hover:text-indigo-400">Join</span>`;
            groupList.appendChild(div);
        });

        // 3. When the user clicks "Enter the Void"
        function enterLobby() {
            const nickname = document.getElementById('nickname').value;
            const age = document.getElementById('age').value; // Grab the age from the slider
            if(!nickname) return alert("Pick a nickname!");
            
            // Send their info to your server
            socket.emit('join_lobby', { nickname, age, topics: Array.from(selectedTopics) });

            // Hide the front page, show the second page
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
        }

        // 4. When the server tells us who is online, draw their cards
        socket.on('update_lobby', (users) => {
            const grid = document.getElementById('users-grid');
            grid.innerHTML = users.map(user => `
                <div class="glass p-4 rounded-2xl hover:border-indigo-500/50 transition-all">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-indigo-300 text-lg">${user.nickname}</h3>
                        <span class="text-xs bg-indigo-500/20 text-indigo-400 px-2 py-1 rounded-md">Age ${user.age || '??'}</span>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        ${user.topics.map(t => `<span class="text-[10px] uppercase tracking-tighter bg-white/5 px-2 py-0.5 rounded">${t}</span>`).join('')}
                    </div>
                    <button class="w-full mt-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 text-xs font-bold uppercase tracking-widest transition-all">Message</button>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
