<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NightTalk | Anonymous Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050505; color: #f3f4f6; overflow: hidden; }
        .glass { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-dating { background: rgba(236, 72, 153, 0.05); border: 1px solid rgba(236, 72, 153, 0.2); }
        .chip { transition: all 0.2s; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); }
        .chip.selected { background: #6366f1; border-color: #818cf8; color: white; box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
        .gender-btn.selected { background: white; color: black; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .photo-preview { background-size: cover; background-position: center; }
        /* Style for the disabled link */
        .forgot-password-disabled { color: #52525b; font-size: 11px; font-weight: 500; cursor: not-allowed; text-transform: lowercase; }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center">

    <div class="fixed top-0 left-0 w-full h-full -z-10 bg-[radial-gradient(circle_at_20%_35%,rgba(79,70,229,0.1)_0%,transparent_30%),radial-gradient(circle_at_80%_65%,rgba(236,72,153,0.1)_0%,transparent_30%)]"></div>

    <div id="auth-container" class="glass max-w-lg w-full p-8 rounded-[2rem] shadow-2xl z-50 absolute transition-all duration-500 max-h-[95vh] flex flex-col border-t border-white/10">
        
        <div class="text-center mb-8">
            <h1 class="text-5xl font-bold tracking-tighter mb-1 text-white lowercase drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">nighttalk.</h1>
            <p id="auth-subtitle" class="text-indigo-400 text-sm font-medium lowercase">secure anonymous access.</p>
        </div>
        
        <div id="step-0" class="space-y-4 flex-1">
            <button onclick="showLogin()" class="w-full py-4 rounded-2xl font-bold bg-white text-black hover:bg-gray-200 shadow-[0_0_20px_rgba(255,255,255,0.2)] transition-all lowercase">i already have an account</button>
            <button onclick="showSignup()" class="w-full py-4 rounded-2xl font-bold bg-white/5 text-white hover:bg-white/10 transition-all border border-white/10 lowercase">i'm new here</button>
        </div>

        <div id="step-login" class="hidden space-y-4 flex-1">
            <input type="text" id="login-user" class="w-full bg-black/60 border border-white/10 rounded-2xl px-4 py-3 text-sm text-white lowercase" placeholder="username">
            <input type="password" id="login-pass" class="w-full bg-black/60 border border-white/10 rounded-2xl px-4 py-3 text-sm text-white" placeholder="password">
            
            <div class="text-right mt-1">
                <span class="forgot-password-disabled">forgot password? 🔒</span>
            </div>
            
            <button onclick="submitLogin()" class="w-full py-4 rounded-2xl font-bold bg-indigo-600 text-white hover:bg-indigo-500 shadow-[0_0_20px_rgba(79,70,229,0.4)] transition-all lowercase mt-4">log in ➔</button>
            <button onclick="goBack()" class="w-full py-3 text-xs text-gray-500 hover:text-white lowercase">back</button>
        </div>

        <div id="step-signup-1" class="hidden space-y-5 flex-1">
            <input type="text" id="reg-user" class="w-full bg-black/60 border border-white/10 rounded-2xl px-4 py-3 text-sm text-white lowercase" placeholder="username">
            <input type="password" id="reg-pass" class="w-full bg-black/60 border border-white/10 rounded-2xl px-4 py-3 text-sm text-white" placeholder="secret password">
            <div class="flex gap-2 mt-2">
                <button onclick="selectGender('boy', this)" class="gender-btn flex-1 py-3 bg-black/40 rounded-2xl text-xs font-semibold text-gray-400 border border-white/5 lowercase">boy</button>
                <button onclick="selectGender('girl', this)" class="gender-btn flex-1 py-3 bg-black/40 rounded-2xl text-xs font-semibold text-gray-400 border border-white/5 lowercase">girl</button>
            </div>
            <button onclick="goToSignup2()" class="w-full py-4 rounded-2xl font-bold bg-white text-black hover:bg-gray-200 transition-all lowercase">next ➔</button>
            <button onclick="goBack()" class="w-full py-2 text-xs text-gray-500 hover:text-white lowercase">back</button>
        </div>

        <div id="step-signup-2" class="hidden space-y-5 overflow-y-auto pr-2 custom-scrollbar flex-1">
            <div class="flex flex-col items-center gap-3">
                <div id="photo-preview" class="w-24 h-24 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-3xl overflow-hidden photo-preview text-gray-500">📷</div>
                <label class="text-[10px] bg-white/10 px-3 py-1.5 rounded-lg cursor-pointer hover:bg-white/20 transition-all lowercase font-bold">
                    upload photo
                    <input type="file" id="photo-upload" accept="image/*" class="hidden" onchange="previewPhoto(event)">
                </label>
            </div>
            <div>
                <label class="block text-xs font-semibold lowercase text-gray-400 mb-2">age: <span id="ageVal" class="text-indigo-400 font-bold">21</span></label>
                <input type="range" id="age" min="13" max="99" value="21" class="w-full accent-indigo-500" oninput="document.getElementById('ageVal').innerText = this.value">
            </div>
            <div class="flex items-center gap-4 p-4 bg-pink-500/5 rounded-2xl border border-pink-500/20 cursor-pointer" onclick="document.getElementById('dating-opt-in').click()">
                <input type="checkbox" id="dating-opt-in" class="w-5 h-5 accent-pink-500 pointer-events-none">
                <div><span class="font-bold text-pink-400 text-sm lowercase">rizz lounge (18+ only)</span></div>
            </div>
            <button onclick="submitSignup()" class="w-full py-4 rounded-2xl font-bold bg-indigo-600 hover:bg-indigo-500 text-white transition-all lowercase mt-2">pull up ✨</button>
        </div>
    </div>

    <div id="dashboard" class="hidden h-full w-full flex opacity-0 transition-opacity duration-700">
        <nav class="w-20 md:w-64 glass border-r border-white/5 flex flex-col p-4 bg-black/40">
            <h2 class="hidden md:block text-2xl font-bold text-white mb-8 mt-4 px-3 lowercase">nighttalk.</h2>
            <div class="space-y-3 flex-1">
                <button onclick="switchTab('global')" id="tab-global" class="w-full flex items-center gap-4 p-3.5 rounded-2xl bg-white/10 text-white font-semibold transition-all lowercase text-sm"><span>🪐</span> <span class="hidden md:block">lobby</span></button>
                <button onclick="switchTab('dating')" id="tab-dating" class="w-full flex items-center gap-4 p-3.5 rounded-2xl hover:bg-white/5 text-gray-500 font-semibold transition-all lowercase text-sm"><span>🔥</span> <span class="hidden md:block">rizz lounge</span></button>
                <button onclick="switchTab('dms')" id="tab-dms" class="w-full flex items-center gap-4 p-3.5 rounded-2xl hover:bg-white/5 text-gray-500 font-semibold transition-all lowercase text-sm"><span>💬</span> <span class="hidden md:block">chats</span></button>
            </div>
        </nav>
        <main class="flex-1 h-full overflow-y-auto p-4 md:p-8 custom-scrollbar">
            <div id="view-global" class="w-full max-w-5xl mx-auto"><div id="grid-global" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div></div>
            <div id="view-dating" class="hidden w-full max-w-5xl mx-auto"><div id="grid-dating" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div></div>
            <div id="view-dms" class="hidden w-full max-w-3xl mx-auto"><div id="grid-dms" class="flex flex-col gap-3"></div></div>
        </main>
        <aside id="chat-drawer" class="fixed right-0 top-0 h-full w-full md:w-[400px] glass border-l border-white/10 transform translate-x-full transition-transform duration-300 z-40 flex flex-col bg-[#0a0a0a]">
            <div class="p-5 border-b border-white/5 flex justify-between items-center bg-white/5">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-full bg-indigo-600 bg-cover bg-center" id="chat-avatar"></div>
                    <div><h3 id="chat-username" class="text-lg font-bold text-white lowercase">user</h3></div>
                </div>
                <button onclick="closeChat()" class="text-gray-500 hover:text-white font-bold bg-white/5 px-4 py-2 rounded-xl text-xs lowercase">close x</button>
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto p-5 flex flex-col gap-4 custom-scrollbar"></div>
            <div id="chat-input-area" class="p-4 border-t border-white/5 bg-black/60 flex gap-2"></div>
        </aside>
    </div>

    <div id="notification-popup" class="hidden fixed bottom-6 right-6 md:right-[420px] glass p-4 rounded-2xl shadow-2xl z-50 border border-white/10 cursor-pointer bg-[#0a0a0a]/90" onclick="openChat(pendingChatUserId, pendingChatUserName, null)">
        <p class="text-xs text-indigo-400 font-bold mb-1 lowercase">tea alert from <span id="noti-name" class="text-white"></span></p>
        <p id="noti-msg" class="text-sm text-gray-300 truncate w-48 lowercase">msg</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(window.location.origin, { secure: true, transports: ['websocket', 'polling'] });
        let myData = null, selectedGender = "", uploadedPhoto = null, allUsers = [], myContacts = {}, currentChatUserId = null, pendingChatUserId = null, pendingChatUserName = null;
        function showLogin() { hideAllSteps(); document.getElementById('step-login').classList.remove('hidden'); }
        function showSignup() { hideAllSteps(); document.getElementById('step-signup-1').classList.remove('hidden'); }
        function goBack() { hideAllSteps(); document.getElementById('step-0').classList.remove('hidden'); }
        function hideAllSteps() { ['step-0', 'step-login', 'step-signup-1', 'step-signup-2'].forEach(id => document.getElementById(id).classList.add('hidden')); }
        function selectGender(gender, btn) { selectedGender = gender; document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); }
        function previewPhoto(event) { const file = event.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (e) => { uploadedPhoto = e.target.result; const prev = document.getElementById('photo-preview'); prev.style.backgroundImage = `url(${uploadedPhoto})`; prev.innerText = ""; }; reader.readAsDataURL(file); }
        function goToSignup2() { if(!document.getElementById('reg-user').value || !document.getElementById('reg-pass').value || !selectedGender) return alert("fill out everything bestie."); hideAllSteps(); document.getElementById('step-signup-2').classList.remove('hidden'); }
        function submitSignup() { const username = document.getElementById('reg-user').value, password = document.getElementById('reg-pass').value, age = parseInt(document.getElementById('age').value), lookingForDates = document.getElementById('dating-opt-in').checked; if(lookingForDates && age < 18) return alert("18+ only for the lounge 🛑"); if(lookingForDates && !uploadedPhoto) return alert("upload a fit pic first 📷"); socket.emit('signup', { username, password, gender: selectedGender, age, lookingForDates, photo: uploadedPhoto }); }
        function submitLogin() { const username = document.getElementById('login-user').value, password = document.getElementById('login-pass').value; if(!username || !password) return; socket.emit('login', { username, password }); }
        socket.on('auth_error', (msg) => alert(msg));
        socket.on('auth_success', (userData) => { myData = userData; document.getElementById('auth-container').classList.add('hidden'); const dash = document.getElementById('dashboard'); dash.classList.remove('hidden'); setTimeout(() => dash.style.opacity = "1", 50); renderDMs(); });
        function switchTab(tabName) { ['global', 'dating', 'dms'].forEach(t => document.getElementById(`view-${t}`).classList.add('hidden')); document.getElementById(`view-${tabName}`).classList.remove('hidden'); if(tabName === 'dms') renderDMs(); }
        socket.on('update_lobby', (users) => { allUsers = users; let globalHTML = '', datingHTML = ''; users.forEach(user => { if(user.socketId === socket.id || !user.onlineStatus) return; const photoStyle = user.photo ? `background-image: url(${user.photo}); background-size: cover; text-indent: -9999px;` : ''; globalHTML += `<div class="glass p-6 rounded-[2rem] flex items-center gap-4 hover:bg-white/5 transition-all"><div class="w-16 h-16 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-2xl text-white shadow-lg" style="${photoStyle}">${user.username.charAt(0)}</div><div class="flex-1"><h3 class="font-bold text-white text-lg lowercase">${user.username}</h3><p class="text-[10px] text-gray-400">age ${user.age}</p></div><button onclick="openChat('${user.socketId}', '${user.username}', '${user.photo}')" class="px-4 py-2 rounded-xl bg-white/10 hover:bg-white/20 text-white text-xs font-semibold lowercase">message</button></div>`; if(user.lookingForDates && user.age >= 18) { datingHTML += `<div class="glass-dating p-6 rounded-[2rem] flex flex-col items-center text-center"><div class="w-24 h-24 rounded-full bg-pink-600 mb-4 flex items-center justify-center text-3xl font-bold text-white shadow-[0_0_20px_rgba(236,72,153,0.3)]" style="${photoStyle}">${user.username.charAt(0)}</div><h3 class="font-bold text-white text-xl lowercase">${user.username}, ${user.age}</h3><button onclick="openChat('${user.socketId}', '${user.username}', '${user.photo}')" class="mt-4 py-3 w-full rounded-2xl bg-pink-600 hover:bg-pink-500 text-white text-sm font-bold shadow-[0_0_15px_rgba(236,72,153,0.4)] lowercase">slide in dms 💌</button></div>`; } }); document.getElementById('grid-global').innerHTML = globalHTML || '<p class="text-gray-600">no one here rn.</p>'; document.getElementById('grid-dating').innerHTML = datingHTML || '<p class="text-gray-600">no one here rn.</p>'; });
        function initContact(id, name, photo) { if(!myContacts[id]) myContacts[id] = { name, photo, messages: [], status: 'none', iAmSender: false }; }
        function openChat(id, name, photo) { currentChatUserId = id; initContact(id, name, photo); document.getElementById('chat-username').innerText = name; const avatar = document.getElementById('chat-avatar'); if(myContacts[id].photo) { avatar.style.backgroundImage = `url(${myContacts[id].photo})`; avatar.innerText = ''; } else { avatar.style.backgroundImage = ''; avatar.innerText = name.charAt(0); } document.getElementById('chat-drawer').classList.remove('translate-x-full'); renderChatUI(); }
        function renderChatUI() { const contact = myContacts[currentChatUserId], chatBox = document.getElementById('chat-messages'), inputArea = document.getElementById('chat-input-area'); chatBox.innerHTML = ''; contact.messages.forEach(msg => { const align = msg.side === 'right' ? 'self-end' : 'self-start', bg = msg.side === 'right' ? 'bg-white text-black' : 'bg-white/10 text-white'; chatBox.innerHTML += `<div class="flex flex-col ${align} max-w-[85%] mb-4"><div class="${bg} px-5 py-3 rounded-2xl text-sm shadow-lg">${msg.text}</div></div>`; }); chatBox.scrollTop = chatBox.scrollHeight; if (contact.status === 'none' || contact.status === 'accepted') { inputArea.innerHTML = `<input type="text" id="chat-input" class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 lowercase" placeholder="say something..."><button onclick="sendMessage()" class="bg-white text-black hover:bg-gray-200 px-6 rounded-2xl font-bold text-sm lowercase">send</button>`; setTimeout(() => document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); }), 50); } else if (contact.status === 'pending' && contact.iAmSender) { inputArea.innerHTML = `<div class="w-full text-center text-xs text-gray-500 py-3 font-medium lowercase">request sent. waiting for them to accept. 🔒</div>`; } else if (contact.status === 'pending' && !contact.iAmSender) { inputArea.innerHTML = `<button onclick="acceptRequest('${currentChatUserId}')" class="flex-1 bg-green-500 hover:bg-green-400 text-black py-3 rounded-2xl font-bold text-sm lowercase shadow-[0_0_15px_rgba(74,222,128,0.3)]">accept ✅</button><button onclick="closeChat()" class="flex-1 bg-white/5 hover:bg-white/10 text-white py-3 rounded-2xl font-bold text-sm lowercase">ignore 🚫</button>`; } }
        function closeChat() { document.getElementById('chat-drawer').classList.add('translate-x-full'); currentChatUserId = null; }
        function sendMessage() { const input = document.getElementById('chat-input'), msg = input.value.trim(); if(!msg || !currentChatUserId) return; const contact = myContacts[currentChatUserId]; if(contact.status === 'none') { contact.status = 'pending'; contact.iAmSender = true; } contact.messages.push({ text: msg, side: 'right' }); socket.emit('send_message', { receiverId: currentChatUserId, message: msg }); input.value = ''; renderChatUI(); renderDMs(); }
        socket.on('receive_message', (data) => { const senderInfo = allUsers.find(u => u.socketId === data.senderId), senderName = senderInfo ? senderInfo.username : "anon", senderPhoto = senderInfo ? senderInfo.photo : null; initContact(data.senderId, senderName, senderPhoto); const contact = myContacts[data.senderId]; contact.messages.push({ text: data.message, side: 'left' }); if(contact.status === 'none') { contact.status = 'pending'; contact.iAmSender = false; } if (currentChatUserId === data.senderId) renderChatUI(); else showNotification(data.senderId, senderName, data.message); renderDMs(); });
        function acceptRequest(id) { myContacts[id].status = 'accepted'; socket.emit('request_accepted', { senderId: id }); renderChatUI(); }
        socket.on('request_accepted_notification', (data) => { if(myContacts[data.accepterId]) { myContacts[data.accepterId].status = 'accepted'; if(currentChatUserId === data.accepterId) renderChatUI(); } });
        function showNotification(id, name, msg) { pendingChatUserId = id; pendingChatUserName = name; document.getElementById('noti-name').innerText = name; document.getElementById('noti-msg').innerText = msg; document.getElementById('notification-popup').classList.remove('hidden'); setTimeout(() => document.getElementById('notification-popup').classList.add('hidden'), 5000); }
        function renderDMs() { const grid = document.getElementById('grid-dms'), contactIds = Object.keys(myContacts); if(contactIds.length === 0) return grid.innerHTML = '<p class="text-gray-600 text-sm lowercase">dry dms.</p>'; grid.innerHTML = contactIds.map(id => { const c = myContacts[id], lastMsg = c.messages.length > 0 ? c.messages[c.messages.length-1].text : '', reqBadge = (c.status === 'pending' && !c.iAmSender) ? `<span class="bg-indigo-500 text-white text-[10px] px-2 py-0.5 rounded-md ml-2">new request!</span>` : ''; return `<div onclick="openChat('${id}', '${c.name}', null)" class="glass p-4 rounded-[1.5rem] flex items-center gap-4 cursor-pointer hover:bg-white/10 border border-white/5"><div class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center font-bold">${c.name.charAt(0)}</div><div class="flex-1"><h4 class="font-bold text-white flex items-center lowercase text-md">${c.name} ${reqBadge}</h4><p class="text-xs text-gray-500 truncate w-48 lowercase">${lastMsg}</p></div></div>`; }).join(''); }
    </script>
</body>
</html>
